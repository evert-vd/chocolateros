<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alineación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    * {
      box-sizing: border-box;
    }

    .player {
      position: absolute;
      transform: translate(-50%, -50%);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
    }

    .player.selected .p-icon svg {
      filter: drop-shadow(0 0 4px #FFD700);
    }

    .player.dragging .p-icon svg {
      transform: scale(1.2);
    }

    .p-icon svg {
      transition: transform 0.1s;
      display: block;
    }
  </style>
</head>

<body class="bg-slate-800 text-slate-800 font-sans text-xs h-dvh w-full place-items-center p-2">

  <div class="flex flex-col max-w-3xl h-full border border-slate-600 rounded-xl overflow-hidden">

    <div class="flex flex-row w-full bg-slate-700 justify-evenly border-b border-slate-600 px-1 py-1.5 gap-1">
      <input
        class="bg-slate-800 border-none rounded-md px-1.5 uppercase caret-green-600 font-semibold max-w-30 text-white placeholder:capitalize"
        id="teamName" maxlength="30" placeholder="Equipo" />
      <select id="count" class="bg-slate-800 text-white border border-slate-600 rounded-lg px-2 py-1"></select>

      <div id="icon" class="flex flex-nowrap border border-slate-600 rounded-lg overflow-hidden text-white">
        <button id="btnShirt"
          class="px-2 cursor-pointer whitespace-nowrap transition-colors duration-150 h-full py-1 bg-green-600 font-semibold"
          onclick="setShape('shirt')">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5" viewBox="0 0 24 24">
            <path fill="#fff"
              d="M23.172 3.836L15 1.113V2.5a3 3 0 0 1-6 0V1.113L.828 3.837L2.198 10H5.5v13h13V10h3.302z" />
          </svg>
        </button>

        <button id="btnCircle" class="px-2 cursor-pointer whitespace-nowrap transition-colors duration-150  h-full py-1"
          onclick="setShape('circle')">
          <div class="rounded-full size-5 bg-white"></div>
        </button>
      </div>

      <div class="flex items-center justify-center gap-2">
        <button onclick="downloadJpg()"
          class="bg-green-600 rounded-lg cursor-pointer whitespace-nowrap transition-colors duration-150 text-green-50 h-full py-1.5 px-2 font-semibold">&#8659;
          Descargar</button>
      </div>
    </div>

    <div class="flex sm:flex-row flex-col h-full w-full overflow-auto">
      <div class="flex flex-row w-full px-2">
        <div class="relative py-1 center flex h-full place-content-center w-full" id="fieldWrap">
          <svg id="field" class="w-full block rounded-lg" viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg">
            <rect width="340" height="520" fill="#1a4a2e" />
            <g fill="none">
              <g opacity="0.18">
                <rect x="0" y="0" width="340" height="52" fill="#fff" />
                <rect x="0" y="104" width="340" height="52" fill="#fff" />
                <rect x="0" y="208" width="340" height="52" fill="#fff" />
                <rect x="0" y="312" width="340" height="52" fill="#fff" />
                <rect x="0" y="416" width="340" height="52" fill="#fff" />
              </g>
              <g stroke="#fff" stroke-width="1.5" opacity="0.7">
                <rect x="14" y="14" width="312" height="492" rx="2" />
                <line x1="14" y1="260" x2="326" y2="260" />
                <circle cx="170" cy="260" r="46" />
                <circle cx="170" cy="260" r="2.5" fill="#fff" />
                <rect x="95" y="14" width="150" height="58" />
                <rect x="125" y="14" width="90" height="28" />
                <rect x="95" y="448" width="150" height="58" />
                <rect x="125" y="478" width="90" height="28" />
                <circle cx="170" cy="96" r="2.5" fill="#fff" />
                <circle cx="170" cy="424" r="2.5" fill="#fff" />
              </g>
            </g>
          </svg>
          <div id="players"></div>
        </div>
      </div>

      <div
        class="h-full flex flex-col w-full sm:w-96 p-0.5 border-t sm:border-l border-slate-600 justify-items-center place-content-center sm:place-content-start">
        <div class="flex flex-wrap gap-[5px] justify-center " id="colorGrid"></div>
        <div id="editPanel"
          class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-xl p-1 w-full h-fit my-1 gap-1.5 flex flex-col">

          <span class="flex flex-row gap-1">
            <h3 class="text-[13px] font-medium text-[#eee]" id="editTitle">Editar jugador</h3>
            <span class="text-gray-600">Sel. jugador para editar | Mover para
              alinear</span>
          </span>

          <!-- <h3 class="text-[14px] font-medium text-[#eee]" id="editTitle">Editar jugador</h3> -->
          <div class="flex flex-row gap-2 w-full">

            <label class="flex flex-row items-center w-3/5 gap-1">
              <span class="text-xs text-[#999]">Nombre</span>
              <input type="text" id="editName" placeholder="Nombre" oninput="applyEdit()"
                class="bg-[#111] text-[#f1f1f1] border border-[#333] rounded-lg px-2 py-2 text-base placeholder:text-gray-600 w-full"
                maxlength="10">
            </label>

            <label class="flex flex-row items-center w-2/5 gap-1">
              <span class="text-xs text-[#999]">Núm</span>
              <input type="number" id="editNum" min="1" max="99" oninput="applyEdit()"
                class="bg-[#111] text-[#f1f1f1] border border-[#333] rounded-lg px-2 py-2 text-base placeholder:text-gray-600 w-full"
                placeholder="N°">
            </label>

            <!--  <div class="flex flex-row gap-1 items-center h-10">
              <label class="text-xs text-[#999]">Nombre</label>
              <input type="text" id="editName" placeholder="Nombre" oninput="applyEdit()"
                class="bg-[#111] text-[#f1f1f1] border border-[#333] rounded-lg px-2 py-1 h-full text-base placeholder:text-gray-600"
                maxlength="10">
            </div>
            <div class="flex flex-row gap-1 items-center h-10">
              <label class="text-xs text-[#999]">Número</label>
              <input type="number" id="editNum" min="1" max="99" oninput="applyEdit()"
                class="bg-[#111] text-[#f1f1f1] border border-[#333] rounded-lg px-2 py-1 text-base h-full placeholder:text-gray-600"
                placeholder="N°">
            </div> -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const VW = 340, VH = 520;
    const formations = {
      4: [[170, 490], [110, 340], [230, 340], [170, 180]],
      5: [[170, 490], [80, 340], [170, 340], [260, 340], [170, 170]],
      6: [[170, 490], [70, 360], [170, 360], [270, 360], [120, 200], [220, 200]],
      7: [[170, 490], [70, 370], [170, 370], [270, 370], [120, 220], [220, 220], [170, 90]],
      8: [[170, 490], [65, 380], [170, 380], [275, 380], [100, 250], [240, 250], [130, 120], [210, 120]],
      9: [[170, 490], [60, 390], [170, 390], [280, 390], [90, 270], [250, 270], [90, 150], [170, 90], [250, 150]],
      10: [[170, 490], [60, 400], [170, 400], [280, 400], [80, 280], [170, 260], [260, 280], [100, 150], [170, 90], [240, 150]],
      11: [[170, 490], [50, 410], [130, 410], [210, 410], [290, 410], [90, 290], [170, 265], [250, 290], [110, 150], [170, 85], [230, 150]]
    };
    const defaultNames = ["Port", "Def", "Def", "Def", "Def", "Med", "Med", "Med", "Del", "Del", "Del"];

    const COLORS = [
      { hex: '#baa97d', name: 'Crema' },
      { hex: '#e63946', name: 'Rojo' },
      { hex: '#f4721e', name: 'Naranja' },
      { hex: '#f7c325', name: 'Amarillo' },
      { hex: '#1d7bc4', name: 'Azul' },
      { hex: '#5c4fce', name: 'Morado' },
      { hex: '#35a79b', name: 'Verde' },
      { hex: '#1a1a2e', name: 'Marino' },
    ];

    const TEXT_COLOR = {
      '#baa97d': '#62382c', //texto para crema
      '#e63946': '#fff',
      '#f4721e': '#fff',
      '#f7c325': '#fff',
      '#1d7bc4': '#fff',
      '#5c4fce': '#fff',
      '#35a79b': '#fff',
      '#1a1a2e': '#fff',
    };

    const BG_TEXT_COLOR = {
      '#baa97d': '#e1dcc6', //texto para crema
      '#e63946': '#AA3939',
      '#f4721e': '#AA7537',
      '#f7c325': '#AA9637',
      '#1d7bc4': '#3bb4e8',
      '#5c4fce': '#a7b2e6',
      '#35a79b': '#3b7e9b',
      '#1a1a2e': '#3e3e5b',
    };

    let players = [], color = COLORS[0].hex, shape = 'shirt', selectedIdx = null;
    const container = document.getElementById('players');


    function shirtSVG(c, num, name) {
      const tc = TEXT_COLOR[c] || '#fff';
      const bg_tc = BG_TEXT_COLOR[c] || '#fff';

      return `<svg viewBox="0 0 24 24" width="48" height="48" xmlns="http://www.w3.org/2000/svg">

         <defs>
          <filter x="-8%" y="0%" width="120%" height="90%" id="bg-name-shirt">
            <!-- Dilatar el texto para crear forma redondeada -->
            <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
            <!-- Suavizar bordes -->
            <feGaussianBlur in="expanded" stdDeviation="0.5" result="rounded"/>
            <!-- Umbral para bordes definidos -->
            <feComponentTransfer in="rounded" result="mask">
              <feFuncA type="discrete" tableValues="0 1"/>
            </feComponentTransfer>
            <!-- Aplicar color de fondo -->
            <feFlood flood-color="${bg_tc}" flood-opacity="0.8" result="bg"/>
            <feComposite in="bg" in2="mask" operator="in" result="bgColored"/>
            <!-- Texto encima -->
            <feComposite in="SourceGraphic" in2="bgColored" operator="over"/>
          </filter>
        </defs>

        <path d="M23.172 3.836L15 1.113V2.5a3 3 0 0 1-6 0V1.113L.828 3.837L2.198 10H5.5v13h13V10h3.302z"
          fill="${c}"  stroke-width="1"/>
        
           <text x="12" y="12" text-anchor="middle" dominant-baseline="central"
          font-size="7" font-weight="600" fill="${tc}"
          style="">${num}</text>

         
           <text x="12" y="22" text-anchor="middle" dominant-baseline="auto"
          font-size="7" font-weight="600" fill="${tc}"
          paint-order="stroke" filter="url(#bg-name-shirt)">${name}</text>

      </svg>
      
    


      `;
    }


    /*     <svg xmlns="http://www.w3.org/2000/svg" class="size-5" viewBox="0 0 24 24">
          <path fill="#fff"
            d="M23.172 3.836L15 1.113V2.5a3 3 0 0 1-6 0V1.113L.828 3.837L2.198 10H5.5v13h13V10h3.302z" />
        </svg>
     */

    function shirtSVG2(c, num, name) {
      const tc = TEXT_COLOR[c] || '#fff';

      return `<svg viewBox="0 0 48 62" width="48" height="62" xmlns="http://www.w3.org/2000/svg">

        
        <path d="M10 3 L2 15 L11 18 L11 54 L37 54 L37 18 L46 15 L38 3 C35 7 30 9 24 9 C18 9 13 7 10 3Z"
          fill="${c}" stroke="${tc}" stroke-width="1.2"/>
        <text x="24" y="25" text-anchor="middle" dominant-baseline="central"
          font-size="16" font-weight="700" fill="${tc}"
          style="">${num}</text>
        <text x="24" y="45" text-anchor="middle" dominant-baseline="auto"
          font-size="12" font-weight="600" fill="${tc}"
          paint-order="stroke" >${name}</text>
      </svg>`;
    }



    function circleSVG(c, num, name) {
      const tc = TEXT_COLOR[c] || '#fff';
      const bg_tc = BG_TEXT_COLOR[c] || '#fff';

      return `<svg viewBox="0 0 48 62" width="48" height="62" xmlns="http://www.w3.org/2000/svg">

        <defs>
          <filter x="-8%" y="0%" width="120%" height="90%" id="bg-name-circle">
            <!-- Dilatar el texto para crear forma redondeada -->
            <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="expanded"/>
            <!-- Suavizar bordes -->
            <feGaussianBlur in="expanded" stdDeviation="0.5" result="rounded"/>
            <!-- Umbral para bordes definidos -->
            <feComponentTransfer in="rounded" result="mask">
              <feFuncA type="discrete" tableValues="0 1"/>
            </feComponentTransfer>
            <!-- Aplicar color de fondo -->
            <feFlood flood-color="${bg_tc}" flood-opacity="0.8" result="bg"/>
            <feComposite in="bg" in2="mask" operator="in" result="bgColored"/>
            <!-- Texto encima -->
            <feComposite in="SourceGraphic" in2="bgColored" operator="over"/>
          </filter>
        </defs>

        <circle cx="24" cy="22" r="20" fill="${c}" stroke="${tc}" stroke-width="1.5"/>
        <text x="24" y="22" text-anchor="middle" dominant-baseline="central"
          font-size="16" font-weight="700" fill="${tc}"
          style="">${num}</text>
        <text x="24" y="50" text-anchor="middle" dominant-baseline="central"
          font-size="12" font-weight="600" fill="${tc}"
          paint-order="stroke" filter="url(#bg-name-circle)">${name}</text>
      </svg>`;
    }


    function svgToPixels(x, y) {
      const r = document.getElementById('field').getBoundingClientRect();
      return [x * (r.width / VW), y * (r.height / VH)];
    }
    function getScale() {
      const r = document.getElementById('field').getBoundingClientRect();
      return [VW / r.width, VH / r.height];
    }
    function clamp(x, y) { return [Math.max(25, Math.min(VW - 25, x)), Math.max(25, Math.min(VH - 25, y))]; }

    function buildDOM(n) {
      interact('.player').unset();
      container.innerHTML = '';
      players = formations[n].map((pos, i) => ({ name: defaultNames[i] || 'Jugador ' + (i + 1), num: i + 1, x: pos[0], y: pos[1] }));
      selectedIdx = null;
      players.forEach((_, i) => {
        const el = document.createElement('div');
        el.className = 'player';
        el.dataset.idx = i;
        el.innerHTML = `<div class="p-icon"></div>`;
        container.appendChild(el);
      });

      document.getElementById('editName').disabled = true;
      document.getElementById('editNum').disabled = true;

      setupInteract();
      updateAll();
    }

    function updateAll() {
      Array.from(container.children).forEach(el => {
        const i = +el.dataset.idx, p = players[i];
        const [px, py] = svgToPixels(p.x, p.y);
        el.style.left = px + 'px';
        el.style.top = py + 'px';
        el.classList.toggle('selected', i === selectedIdx);
        const icon = el.querySelector('.p-icon');
        icon.innerHTML = shape === 'shirt'
          ? shirtSVG(color, p.num, p.name)
          : circleSVG(color, p.num, p.name);
      });
    }

    const grid = document.getElementById('colorGrid');
    COLORS.forEach((c, i) => {
      const sw = document.createElement('div');
      sw.className = 'w-7 h-7 rounded-full border-2 cursor-pointer transition-transform duration-100 shrink-0'
        + (i === 0 ? ' border-white scale-110' : ' border-transparent');
      sw.style.background = c.hex; sw.title = c.name; sw.dataset.hex = c.hex;
      sw.onclick = () => {
        color = c.hex;
        document.querySelectorAll('#colorGrid > div').forEach(s => {
          s.classList.remove('border-white', 'scale-110'); s.classList.add('border-transparent');
        });
        sw.classList.remove('border-transparent'); sw.classList.add('border-white', 'scale-110');
        updateAll();
      };
      grid.appendChild(sw);
    });

    const sel = document.getElementById('count');
    for (let i = 4; i <= 11; i++) { const o = document.createElement('option'); o.value = i; o.textContent = i; sel.appendChild(o); }
    sel.value = 11;

    function setShape(s) {
      shape = s;
      const btnC = document.getElementById('btnCircle'), btnS = document.getElementById('btnShirt');
      if (s === 'circle') { btnC.classList.add('bg-green-600', 'font-semibold'); btnS.classList.remove('bg-green-600', 'font-semibold'); }
      else { btnS.classList.add('bg-green-600', 'font-semibold'); btnC.classList.remove('bg-green-600', 'font-semibold'); }
      updateAll();
    }

    function setupInteract() {
      interact('.player').draggable({
        inertia: false,
        listeners: {
          start(e) { e.target.classList.add('dragging'); },
          move(e) {
            const i = +e.target.dataset.idx;
            const [sx, sy] = getScale();
            const [nx, ny] = clamp(players[i].x + e.dx * sx, players[i].y + e.dy * sy);
            players[i].x = nx; players[i].y = ny;
            const [px, py] = svgToPixels(nx, ny);
            e.target.style.left = px + 'px'; e.target.style.top = py + 'px';
          },
          end(e) { e.target.classList.remove('dragging'); }
        }
      }).on('tap', e => selectPlayer(+e.currentTarget.dataset.idx));
    }

    function selectPlayer(i) {
      selectedIdx = i;
      const p = players[i];
      document.getElementById('editTitle').textContent = 'Jugador #' + p.num;
      document.getElementById('editName').value = p.name;
      document.getElementById('editNum').value = p.num;
      document.getElementById('editName').disabled = false;
      document.getElementById('editNum').disabled = false;
      updateAll();
    }

    function applyEdit() {
      if (selectedIdx === null) return;
      players[selectedIdx].name = document.getElementById('editName').value || '';
      const n = parseInt(document.getElementById('editNum').value);
      players[selectedIdx].num = isNaN(n) ? '' : n;
      document.getElementById('editTitle').textContent = 'Jugador #' + players[selectedIdx].num;
      updateAll();
    }

    function downloadJpg() {
      const btn = event.currentTarget;
      btn.textContent = 'Generando...'; btn.disabled = true;

      const teamName = document.getElementById('teamName').value.trim() || 'Alineacion';
      const now = new Date();
      const fecha = now.getFullYear().toString()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0');
      const filename = `${teamName} - ${fecha}`;

      const wrap = document.getElementById('fieldWrap');
      html2canvas(wrap, { backgroundColor: '#111', scale: 1.5, useCORS: true, allowTaint: true }).then(canvas => {
        const a = document.createElement('a');
        a.download = filename + '.jpg';
        a.href = canvas.toDataURL('image/jpeg', 0.92);
        a.click();
        btn.textContent = '⬇ Descargar'; btn.disabled = false;
      });
    }

    document.getElementById('field').addEventListener('click', () => {
      selectedIdx = null;
      document.getElementById('editTitle').textContent = 'Editar jugador';
      document.getElementById('editName').value = '';
      document.getElementById('editNum').value = '';
      document.getElementById('editName').disabled = true;
      document.getElementById('editNum').disabled = true;
      updateAll();
    });

    sel.addEventListener('change', e => buildDOM(+e.target.value));
    window.addEventListener('resize', updateAll);

    buildDOM(11);
  </script>
</body>

</html>
