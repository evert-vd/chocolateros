<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);padding:8px;touch-action:manipulation}
.controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin-bottom:10px}
.controls label{font-size:12px;color:var(--color-text-secondary)}
select,input[type=color]{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 6px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);height:34px;cursor:pointer}
button{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:0 12px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);height:34px;cursor:pointer;white-space:nowrap}
button:active{background:var(--color-background-secondary)}
.field-wrap{position:relative;width:100%;max-width:420px;margin:0 auto}
#field{width:100%;display:block;border-radius:6px}
.player{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-50%);touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}
.player.dragging .circle{transform:scale(1.2);border-color:#FFD700}
.player.selected .circle{border-color:#FFD700}
.circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;border:2.5px solid rgba(255,255,255,0.6);transition:transform .1s,border-color .1s}
.pname{font-size:10px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.85);margin-top:2px;max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.edit-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-top:10px;max-width:420px;margin-left:auto;margin-right:auto;display:none}
.edit-panel h3{font-size:14px;font-weight:500;margin-bottom:10px}
.edit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.edit-row label{font-size:12px;color:var(--color-text-secondary);width:58px;flex-shrink:0}
.edit-row input{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 8px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);height:34px}
.tip{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin-top:6px}
</style>

<div class="controls">
  <label>Jugadores:</label>
  <select id="count"></select>
  <label>Color:</label>
  <input type="color" id="teamColor" value="#e63946">
  <button onclick="randomize()">&#8652; Aleatoria</button>
</div>

<div class="field-wrap" id="fieldWrap">
  <svg id="field" viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg">
    <rect width="340" height="520" fill="#2d8a4e"/>
    <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.65">
      <rect x="14" y="14" width="312" height="492" rx="2"/>
      <line x1="14" y1="260" x2="326" y2="260"/>
      <circle cx="170" cy="260" r="46"/>
      <circle cx="170" cy="260" r="2.5" fill="#fff"/>
      <rect x="95" y="14" width="150" height="58"/>
      <rect x="125" y="14" width="90" height="28"/>
      <rect x="95" y="448" width="150" height="58"/>
      <rect x="125" y="478" width="90" height="28"/>
      <circle cx="170" cy="96" r="2.5" fill="#fff"/>
      <circle cx="170" cy="424" r="2.5" fill="#fff"/>
    </g>
    <g opacity="0.12">
      <rect x="14" y="14" width="312" height="50" fill="#fff"/>
      <rect x="14" y="456" width="312" height="50" fill="#fff"/>
      <rect x="14" y="114" width="312" height="50" fill="#fff"/>
      <rect x="14" y="356" width="312" height="50" fill="#fff"/>
      <rect x="14" y="214" width="312" height="50" fill="#fff"/>
      <rect x="14" y="296" width="312" height="50" fill="#fff"/>
    </g>
  </svg>
  <div id="players"></div>
</div>

<div class="edit-panel" id="editPanel">
  <h3 id="editTitle">Editar jugador</h3>
  <div class="edit-row">
    <label>Nombre</label>
    <input type="text" id="editName" placeholder="Nombre" oninput="applyEdit()">
  </div>
  <div class="edit-row">
    <label>Número</label>
    <input type="number" id="editNum" min="1" max="99" oninput="applyEdit()">
  </div>
</div>
<p class="tip">Toca para editar · Arrastra para mover</p>

<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
<script>
const VW=340,VH=520;
const formations={
  4:[[170,490],[110,340],[230,340],[170,180]],
  5:[[170,490],[80,340],[170,340],[260,340],[170,170]],
  6:[[170,490],[70,360],[170,360],[270,360],[120,200],[220,200]],
  7:[[170,490],[70,370],[170,370],[270,370],[120,220],[220,220],[170,90]],
  8:[[170,490],[65,380],[170,380],[275,380],[100,250],[240,250],[130,120],[210,120]],
  9:[[170,490],[60,390],[170,390],[280,390],[90,270],[250,270],[90,150],[170,90],[250,150]],
  10:[[170,490],[60,400],[170,400],[280,400],[80,280],[170,260],[260,280],[100,150],[170,90],[240,150]],
  11:[[170,490],[55,410],[140,410],[230,410],[310,410],[90,290],[170,265],[250,290],[110,150],[170,85],[230,150]]
};
const defaultNames=["Portero","Defensa","Defensa","Defensa","Defensa","Mediocampista","Mediocampista","Mediocampista","Delantero","Delantero","Delantero"];

let players=[];
let color='#e63946';
let selectedIdx=null;
const container=document.getElementById('players');

function svgToPixels(x,y){
  const r=document.getElementById('field').getBoundingClientRect();
  return[x*(r.width/VW), y*(r.height/VH)];
}
function getScale(){
  const r=document.getElementById('field').getBoundingClientRect();
  return[VW/r.width, VH/r.height];
}
function clampSvg(x,y){
  return[Math.max(25,Math.min(VW-25,x)), Math.max(25,Math.min(VH-25,y))];
}

// Crea los elementos DOM una sola vez
function buildDOM(n){
  interact('.player').unset();
  container.innerHTML='';
  players=formations[n].map((pos,i)=>({
    name:defaultNames[i]||'Jugador '+(i+1),
    num:i+1, x:pos[0], y:pos[1]
  }));
  selectedIdx=null;
  document.getElementById('editPanel').style.display='none';

  players.forEach((_,i)=>{
    const el=document.createElement('div');
    el.className='player';
    el.dataset.idx=i;
    el.innerHTML=`<div class="circle"></div><div class="pname"></div>`;
    container.appendChild(el);
  });

  setupInteract();
  updateAll();
}

// Solo actualiza posición, color, texto — sin tocar el DOM estructural
function updateAll(){
  Array.from(container.children).forEach(el=>{
    const i=+el.dataset.idx;
    const p=players[i];
    const[px,py]=svgToPixels(p.x,p.y);
    el.style.left=px+'px';
    el.style.top=py+'px';
    el.classList.toggle('selected', i===selectedIdx);
    el.querySelector('.circle').style.background=color;
    el.querySelector('.circle').textContent=p.num;
    el.querySelector('.pname').textContent=p.name;
  });
}

function setupInteract(){
  interact('.player').draggable({
    inertia:false,
    listeners:{
      start(e){
        e.target.classList.add('dragging');
      },
      move(e){
        const i=+e.target.dataset.idx;
        const[sx,sy]=getScale();
        const[nx,ny]=clampSvg(players[i].x+e.dx*sx, players[i].y+e.dy*sy);
        players[i].x=nx; players[i].y=ny;
        const[px,py]=svgToPixels(nx,ny);
        e.target.style.left=px+'px';
        e.target.style.top=py+'px';
      },
      end(e){
        e.target.classList.remove('dragging');
      }
    }
  }).on('tap',e=>{
    selectPlayer(+e.currentTarget.dataset.idx);
  });
}

function selectPlayer(i){
  selectedIdx=i;
  const p=players[i];
  document.getElementById('editPanel').style.display='block';
  document.getElementById('editTitle').textContent='Jugador #'+p.num;
  document.getElementById('editName').value=p.name;
  document.getElementById('editNum').value=p.num;
  updateAll();
}

function applyEdit(){
  if(selectedIdx===null)return;
  players[selectedIdx].name=document.getElementById('editName').value||'';
  const n=parseInt(document.getElementById('editNum').value);
  players[selectedIdx].num=isNaN(n)?'':n;
  // solo actualiza el elemento seleccionado
  const el=container.querySelector(`[data-idx="${selectedIdx}"]`);
  if(el){
    el.querySelector('.circle').textContent=players[selectedIdx].num;
    el.querySelector('.pname').textContent=players[selectedIdx].name;
  }
  document.getElementById('editTitle').textContent='Jugador #'+players[selectedIdx].num;
}

function randomize(){
  const cols=[65,145,170,225,305];
  const rows=[90,180,270,360,450];
  const pool=[];
  cols.forEach(x=>rows.forEach(y=>pool.push([x,y])));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  players.forEach((p,i)=>{p.x=pool[i][0];p.y=pool[i][1];});
  updateAll();
}

document.getElementById('field').addEventListener('click',()=>{
  selectedIdx=null;
  document.getElementById('editPanel').style.display='none';
  updateAll();
});
document.getElementById('count').addEventListener('change',e=>buildDOM(+e.target.value));
document.getElementById('teamColor').addEventListener('input',e=>{color=e.target.value;updateAll();});
window.addEventListener('resize',updateAll);

const sel=document.getElementById('count');
for(let i=4;i<=11;i++){const o=document.createElement('option');o.value=i;o.textContent=i+(i===11?' (completo)':'');sel.appendChild(o);}
sel.value=11;

buildDOM(11);
</script>
