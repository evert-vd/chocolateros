<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);padding:12px}
h2{font-size:18px;font-weight:500;margin-bottom:12px;text-align:center}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-bottom:14px}
.controls label{font-size:13px;color:var(--color-text-secondary)}
select,input[type=color]{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);height:32px;cursor:pointer}
button{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 14px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);height:32px;cursor:pointer}
button:hover{background:var(--color-background-secondary)}
.field-wrap{position:relative;width:100%;max-width:480px;margin:0 auto}
#field{width:100%;border-radius:8px;display:block}
.player{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:grab;user-select:none;transform:translate(-50%,-50%)}
.player:active{cursor:grabbing}
.circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;border:2px solid rgba(255,255,255,0.7);transition:border-color .2s}
.player.selected .circle{border-color:#FFD700;box-shadow:0 0 0 2px #FFD700}
.player-name{font-size:10px;color:#fff;text-shadow:0 1px 3px #000;margin-top:2px;max-width:56px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.edit-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-top:12px;max-width:480px;margin-left:auto;margin-right:auto;display:none}
.edit-panel h3{font-size:14px;font-weight:500;margin-bottom:10px}
.edit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.edit-row label{font-size:12px;color:var(--color-text-secondary);width:60px;flex-shrink:0}
.edit-row input[type=text],input[type=number]{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);height:30px}
.tip{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin-top:8px}
</style>

<h2>Alineación de Equipo</h2>

<div class="controls">
  <label>Jugadores:</label>
  <select id="count"></select>
  <label>Color:</label>
  <input type="color" id="teamColor" value="#e63946">
  <button onclick="randomize()">Alineación aleatoria</button>
</div>

<div class="field-wrap" id="fieldWrap">
  <svg id="field" viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
    <rect width="480" height="680" fill="#2d8a4e"/>
    <g stroke="#fff" stroke-width="2" fill="none" opacity="0.7">
      <rect x="20" y="20" width="440" height="640" rx="2"/>
      <line x1="20" y1="340" x2="460" y2="340"/>
      <circle cx="240" cy="340" r="60"/>
      <circle cx="240" cy="340" r="3" fill="#fff"/>
      <rect x="130" y="20" width="220" height="80"/>
      <rect x="175" y="20" width="130" height="40"/>
      <rect x="130" y="580" width="220" height="80"/>
      <rect x="175" y="640" width="130" height="40"/>
      <circle cx="240" cy="128" r="3" fill="#fff"/>
      <circle cx="240" cy="552" r="3" fill="#fff"/>
    </g>
    <g opacity="0.15">
      <rect x="20" y="20" width="440" height="64" fill="#fff"/>
      <rect x="20" y="596" width="440" height="64" fill="#fff"/>
      <rect x="20" y="148" width="440" height="64" fill="#fff"/>
      <rect x="20" y="468" width="440" height="64" fill="#fff"/>
      <rect x="20" y="276" width="440" height="64" fill="#fff"/>
      <rect x="20" y="404" width="440" height="64" fill="#fff"/>
    </g>
  </svg>
  <div id="players"></div>
</div>

<div class="edit-panel" id="editPanel">
  <h3 id="editTitle">Editar jugador</h3>
  <div class="edit-row">
    <label>Nombre</label>
    <input type="text" id="editName" placeholder="Nombre" oninput="applyEdit()">
  </div>
  <div class="edit-row">
    <label>Número</label>
    <input type="number" id="editNum" min="1" max="99" oninput="applyEdit()">
  </div>
</div>
<p class="tip">Haz clic en un jugador para editarlo · Arrastra para reposicionarlo</p>

<script>
const sel = document.getElementById('count');
for(let i=4;i<=11;i++){const o=document.createElement('option');o.value=i;o.textContent=i+(i===11?' (completo)':'');sel.appendChild(o);}
sel.value=11;

const formations={
  4:[[240,630],[120,460],[240,460],[360,460],[240,240]],
  5:[[240,630],[100,460],[230,460],[360,460],[240,280],[240,120]],
  6:[[240,630],[80,480],[240,480],[400,480],[140,290],[340,290]],
  7:[[240,630],[80,490],[240,490],[400,490],[140,310],[340,310],[240,130]],
  8:[[240,630],[80,500],[240,500],[400,500],[120,340],[360,340],[180,170],[300,170]],
  9:[[240,630],[80,510],[240,510],[400,510],[120,360],[360,360],[120,190],[240,120],[360,190]],
  10:[[240,630],[80,520],[240,520],[400,520],[100,370],[240,370],[380,370],[120,200],[240,130],[360,200]],
  11:[[240,630],[80,530],[200,530],[360,530],[460,530],[120,380],[240,340],[360,380],[140,200],[240,130],[340,200]]
};

const defaultNames=["Portero","Defensa","Defensa","Defensa","Defensa","Mediocampista","Mediocampista","Mediocampista","Delantero","Delantero","Delantero"];

let players=[];
let color='#e63946';
let selectedIdx=null;
let dragIdx=null;
let dragOffX=0,dragOffY=0;

function buildPlayers(n){
  players=[];
  const pos=formations[n];
  for(let i=0;i<n;i++){
    players.push({name:defaultNames[i]||'Jugador '+(i+1),num:i+1,x:pos[i][0],y:pos[i][1]});
  }
  selectedIdx=null;
  document.getElementById('editPanel').style.display='none';
  render();
}

function render(){
  const wrap=document.getElementById('fieldWrap');
  const svg=document.getElementById('field');
  const rect=svg.getBoundingClientRect();
  const scaleX=rect.width/480;
  const scaleY=rect.height/680;
  const container=document.getElementById('players');
  container.innerHTML='';
  players.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='player'+(i===selectedIdx?' selected':'');
    el.style.left=(p.x*scaleX)+'px';
    el.style.top=(p.y*scaleY)+'px';
    el.innerHTML=`<div class="circle" style="background:${color}">${p.num}</div><div class="player-name">${p.name}</div>`;
    el.addEventListener('mousedown',e=>startDrag(e,i));
    el.addEventListener('touchstart',e=>startDragTouch(e,i),{passive:false});
    el.addEventListener('click',e=>{e.stopPropagation();selectPlayer(i);});
    container.appendChild(el);
  });
}

function selectPlayer(i){
  selectedIdx=i;
  const p=players[i];
  document.getElementById('editPanel').style.display='block';
  document.getElementById('editTitle').textContent='Jugador #'+p.num;
  document.getElementById('editName').value=p.name;
  document.getElementById('editNum').value=p.num;
  render();
}

function applyEdit(){
  if(selectedIdx===null)return;
  players[selectedIdx].name=document.getElementById('editName').value||'';
  players[selectedIdx].num=parseInt(document.getElementById('editNum').value)||0;
  document.getElementById('editTitle').textContent='Jugador #'+players[selectedIdx].num;
  render();
}

function getFieldCoords(clientX,clientY){
  const svg=document.getElementById('field');
  const rect=svg.getBoundingClientRect();
  const fx=480*(clientX-rect.left)/rect.width;
  const fy=680*(clientY-rect.top)/rect.height;
  return[Math.max(30,Math.min(450,fx)),Math.max(30,Math.min(650,fy))];
}

function startDrag(e,i){
  if(e.button!==0)return;
  dragIdx=i;
  e.preventDefault();
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',endDrag);
}
function startDragTouch(e,i){
  dragIdx=i;
  e.preventDefault();
  document.addEventListener('touchmove',onDragTouch,{passive:false});
  document.addEventListener('touchend',endDragTouch);
}
function onDrag(e){
  if(dragIdx===null)return;
  const[fx,fy]=getFieldCoords(e.clientX,e.clientY);
  players[dragIdx].x=fx;players[dragIdx].y=fy;
  render();
}
function onDragTouch(e){
  if(dragIdx===null)return;
  e.preventDefault();
  const t=e.touches[0];
  const[fx,fy]=getFieldCoords(t.clientX,t.clientY);
  players[dragIdx].x=fx;players[dragIdx].y=fy;
  render();
}
function endDrag(){dragIdx=null;document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',endDrag);}
function endDragTouch(){dragIdx=null;document.removeEventListener('touchmove',onDragTouch);document.removeEventListener('touchend',endDragTouch);}

function randomize(){
  const n=players.length;
  const xs=[80,160,240,320,400];
  const ys=[130,260,390,520,630];
  const positions=[];
  for(let y=0;y<ys.length;y++)for(let x=0;x<xs.length;x++)positions.push([xs[x],ys[y]]);
  for(let i=positions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[positions[i],positions[j]]=[positions[j],positions[i]];}
  players.forEach((p,i)=>{p.x=positions[i][0];p.y=positions[i][1];});
  render();
}

document.getElementById('count').addEventListener('change',e=>buildPlayers(+e.target.value));
document.getElementById('teamColor').addEventListener('input',e=>{color=e.target.value;render();});
document.getElementById('field').addEventListener('click',()=>{selectedIdx=null;document.getElementById('editPanel').style.display='none';render();});

window.addEventListener('resize',render);

buildPlayers(11);
</script>
